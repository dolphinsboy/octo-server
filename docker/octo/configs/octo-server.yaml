# -----------------------------------------------------------------------------
# OCTO Server runtime config — minimal single-host deployment.
# -----------------------------------------------------------------------------
# This file is mounted over the legacy default path inside the container
# (/home/configs/tsdd.yaml) so the Go binary picks it up without CLI flags.
#
# Values shared with MySQL / Redis / MinIO / WuKongIM match the service
# names (not ports) on the `octo-net` bridge network declared in
# docker-compose.yaml. Do not change those strings unless you also rename
# the corresponding compose services.
# -----------------------------------------------------------------------------

# Runtime mode: debug | release
# `release` turns off smsCode and tightens several safety checks.
# ⚠️  Default is `release` for safe OSS deployment. Override via the
#     TS_MODE env var (or edit this file) if you need the convenience
#     features of debug mode for local development.
mode: "release"

# External HTTP base URL used when generating absolute links (QR codes,
# email payloads, etc). Match your nginx-exposed hostname.
external:
  ip: "127.0.0.1"
  baseURL: "http://octo.local:28080"
  # web login URL (optional). Uncomment + set once you integrate octo-web.
  # webLoginURL: "http://octo.local:28080/"

# Test-only SMS verification code — any inbound SMS request will accept
# this string. Ignored in release mode.
# ⚠️  Leaving a value here while mode=debug means ANYONE with the default
#     code can complete registration. See README → Production Hardening.
smsCode: ""

# ---------- Database ---------------------------------------------------------
db:
  mysqlAddr: "root:CHANGE_ME_MYSQL_PASSWORD@tcp(mysql:3306)/octo?charset=utf8mb4&parseTime=true&loc=Local"
  redisAddr: "redis:6379"
  redisPass: ""

# ---------- WuKongIM ---------------------------------------------------------
wukongIM:
  apiURL: "http://wukongim:5001"
  # Populate if you have enabled `tokenAuthOn` on WuKongIM. See configs/wk.yaml.
  managerToken: ""

# ---------- Object storage (MinIO, S3-compatible) ----------------------------
# Note: For browser-direct upload via presigned PUT, the object-storage
# bucket must allow PUT from the octo-web origin. For Aliyun OSS this is a
# CORS rule on the bucket (Aliyun OSS console → 权限管理 → 跨域设置).
# The same caveat applies to MinIO and Tencent COS whenever the upload host
# differs from the octo-web origin (e.g. files.example.com vs octo.example.com).
# Without the CORS rule the browser will block the PUT before it ever leaves
# the page, regardless of how the URL was signed.
#
# SigV4 / OSS signed-header contract — REQUIRED for the browser:
#
# `GET /v1/file/upload-credentials` (modules/file/api.go getUploadCredentials)
# returns `contentType` and (when set) `contentDisposition`. The browser
# MUST echo them as the matching PUT request headers — they are covered by
# the canonical-headers section of the SigV4 signature (and the OSS
# equivalent), so any deviation produces `403 SignatureDoesNotMatch` at
# upload time. This is enforced at the storage layer; no server-side retry
# can rescue a client that does not echo them.
#
# Presigned-URL support matrix (current as of the file/presigned-URL implementation):
#
#   fileService value | presigned PUT (browser direct upload) | presigned GET (signed download)
#   ------------------+---------------------------------------+--------------------------------
#   "minio"           | yes — direct PUT signed by minio-go   | yes — signed GET via minio-go
#   "tencentCOS"      | yes — direct PUT signed by minio-go   | yes — signed GET via minio-go
#   "aliyunOSS"       | yes — direct PUT signed by OSS SDK    | yes — signed GET via OSS SDK
#   "qiniu"           | no  — Qiniu uploads use a token+form  | yes — MakePrivateURLv2 signed URL
#                     |       model that does not map to a    |
#                     |       single PUT URL                  |
#   "seaweedFS"       | no  — no presign primitive in SDK     | no  — public reads are unsigned
#
# Fallback when a backend does not support a presigned operation: the server
# returns a clear error from the corresponding endpoint, and clients should
# fall back to the regular server-side upload flow (POST /file/upload) or
# unsigned DownloadURL. Switch to MinIO/COS/OSS for browser-direct upload.
#
# Tencent COS — supported BucketURL shapes:
#
#   * Default (BucketURL empty) — SDK virtual-hosts to
#     `<bucket>.cos.<region>.myqcloud.com`. Recommended.
#   * Custom domain that carries the `<bucket>.` subdomain — e.g.
#     `https://my-bucket-12345678.cos.example.com`. Stripped + re-prefixed
#     internally so the signed URL host matches the browser's DNS view.
#   * Custom CDN / accelerator domain WITHOUT a `<bucket>.` subdomain —
#     e.g. `https://cdn.example.com`. The server switches the SDK to
#     BucketLookupPath and signs path-style URLs of the form
#     `https://cdn.example.com/<bucket>/<key>`. Added in YUJ-846 hotfix.
#
# Aliyun OSS — V1 signing does NOT cover Content-Length or
# Content-Disposition: deviating values at PUT time are silently
# persisted instead of producing 403 SignatureDoesNotMatch. The
# `maxFileSize` / `contentDisposition` fields in the presigned response
# are advisory on OSS; enforce hard caps at the bucket / RAM-policy
# layer, or use MinIO/COS for full SigV4 coverage.
fileService: "minio"
minio:
  # Server-internal base URL — what the Go process uses to reach MinIO.
  # In compose this is the `minio` service name on the `octo-net` bridge.
  # Browsers cannot resolve this; do NOT expose it to clients.
  url: "http://minio:9000"
  # uploadURL: ""    # optional override; falls back to `url` when empty.
  #                  # Used by UploadFile / GetFile (server-side I/O) and by
  #                  # the bucket-bootstrap path. Keep it pointed at the
  #                  # internal hostname.
  #
  # downloadURL is the BROWSER-FACING base URL: the host the user's browser
  # actually resolves and the host that presigned PUT/GET URLs are signed
  # against. SigV4 covers `host` and the canonical URI in the signed
  # headers, so this MUST be the URL the browser will hit — there is no
  # post-sign rewriting.
  #
  # Strict contract: downloadURL is a `scheme://host[:port]` URL with NO
  # path component. The MinIO API must be reachable directly at that
  # endpoint. Path-prefixed values (e.g. `https://octo.example.com/minio`)
  # are rejected loudly at sign time — they cannot work under standard
  # nginx `proxy_pass <upstream>/` semantics, where the matched prefix is
  # stripped before forwarding and the gateway's view of the canonical
  # URI no longer matches the one SigV4 signed.
  #
  # Typical values:
  #   - docker-compose default:  http://octo.local:29000
  #     (MinIO API exposed on host port 29000 — see OCTO_MINIO_API_PORT
  #      in the deployment repo's docker-compose .env)
  #   - dedicated subdomain:     https://minio.octo.example.com
  #     (operator-driven; requires DNS + TLS cert pointing at MinIO)
  #   - direct LAN MinIO:        http://minio.local:9000
  #
  # NOT supported (rejected at startup / first sign):
  #   - https://octo.example.com/minio  (path-prefixed via nginx)
  #
  # If left empty, downloadURL falls back to `url` and presigned URLs will
  # carry the internal `minio:9000` host — which works only when the Go
  # process and the browser share the same DNS view (i.e. for inside-cluster
  # service-to-service tests, not real users). Set this once your MinIO API
  # port mapping or subdomain is finalized.
  #
  # Default: matches the bundled docker-compose stack with the MinIO API
  # port published to the host on the default `octo.local` domain. Viper
  # does NOT expand shell-style `${VAR:-default}` placeholders in this
  # file (only `docker compose` does, in `docker-compose.yaml`), so this
  # value MUST be a literal browser-reachable URL. The bundled
  # `docker/octo/docker-compose.yaml` therefore sets
  # `TS_MINIO_DOWNLOADURL` from the `OCTO_DOMAIN` / `OCTO_MINIO_API_PORT`
  # env vars (Viper's `TS_` env prefix turns that into an authoritative
  # override over this yaml value); operators running the binary outside
  # Docker should either edit this line or export `TS_MINIO_DOWNLOADURL`
  # directly. The internal hostname `minio` is intentionally NOT used
  # here because browsers cannot resolve it.
  #
  # NOTE: SigV4 signed-header contract — `presignedUpload` returns a
  # `contentType` (and optional `contentDisposition`) that the client
  # MUST echo as the matching PUT request headers. Any deviation
  # produces `403 SignatureDoesNotMatch` because those headers are
  # covered by the signature; see modules/file/api.go presignedUpload
  # for the response shape.
  downloadURL: "http://octo.local:29000"
  accessKeyID: "octoadmin"
  secretAccessKey: "CHANGE_ME_MINIO_PASSWORD"

# ---------- Logging ----------------------------------------------------------
logger:
  level: 2          # 1=debug 2=info 3=warn 4=error
  dir: "./logs"
  lineNum: false

# ---------- Registration -----------------------------------------------------
# Disable open registration in production or restrict to your mobile region.
# ⚠️  Default is `off: true` for safe OSS deployment. Set to false (via
#     .env → TS_REGISTER_OFF or by editing this file) once you have
#     email/SMS providers wired up and are ready to accept public signups.
register:
  off: true
  onlyChina: false
  emailOn: false
