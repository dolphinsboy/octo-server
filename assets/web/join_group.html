<!DOCTYPE html>
<html>

<head>
    <title>确认加群</title>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes"/><!-- 删除苹果默认的工具栏和菜单栏 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black"/><!-- 设置苹果工具栏颜色 -->
    <meta name="format-detection" content="telephone=no, email=no"/><!--忽略页面中的数字识别为电话，忽略email识别 -->
    <link rel="stylesheet" type="text/css" href="css/join_group.css" />
    <link rel="stylesheet" type="text/css" href="css/index.css" />
    <style type="text/css">
        /* YUJ-168 / GH #1243: 外部群 H5 加群 landing 页 Space 信任锚点样式。 */
        .space-info {
            margin-top: 4px;
            font-size: 13px;
            color: #666;
            text-align: center;
        }

        .badge-external {
            display: inline-block;
            margin-left: 6px;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 11px;
            line-height: 16px;
            background: #fff3e0;
            color: #f57c00;
            vertical-align: middle;
        }
    </style>
    <script type="text/javascript" src="js/config.js"></script>
    <script type="text/javascript" src="js/jquery-3.4.1.min.js"></script>
    <script type="text/javascript" src="js/IMJSBridge.js"></script>
    <script type="text/javascript" src="js/index.js"></script>
</head>

<body>
    <div class="group-box">
       <div class="top">
           <div class="group-info">
               <img class="group-avatar"  />
               <p class="name"></p>
               <div class="space-info" style="display:none"></div>
               <p class="num"></p>
           </div>
       </div>
       <div class="bottom">
           <div class="box">
               <p>确认加入群聊</p>
               <div id="ok" class="button primary" style="width: 150px;">加入该群聊</div>
           </div>
       </div>
    </div>
</body>

<script language="javascript">
    let groupNo = getQueryString('group_no');
    let code = getQueryString('auth_code');
    $(function(){
        im.onReady();
        $.getJSON(apiURL+"groups/"+ groupNo + "/detail").then(function(resp){
            let data = resp;
            $(".group-avatar").attr('src',`${apiURL}groups/${groupNo}/avatar`);
            $(".name").text(data.name);
            // YUJ-168 / GH #1243: 展示群所属 Space 信任锚点。
            // - space_name 非空 → 渲染「来自 ${space_name}」（访问者未登录也显示）
            // - is_external==1 → 追加「外部」徽标（仅登录态访问且跨 Space 时置位）
            if (data.space_name) {
                let $info = $(".space-info");
                $info.text(`来自 ${data.space_name}`);
                if (data.is_external == 1) {
                    $info.append(' <span class="badge-external">外部</span>');
                }
                $info.show();
            }
            $(".num").text(`（共${data.member_count}人）`);
        })
        $("#ok").click(function(){
            $.getJSON(`${apiURL}groups/${groupNo}/scanjoin?auth_code=${code}`).then(function(resp){
                // YUJ-170 / dmwork-web#1100: 跨 Space 加群引导。
                // groupScanJoin 成功响应直接回带 space_id / space_name / group_name（YUJ-170
                // 新增字段），避免 /detail 二次往返（非成员首次调 /detail 会 403，成员二次调
                // 又多一次 round-trip）。
                // 若当前端视角 Space 与群所属 Space 不一致，写 sessionStorage.pendingJoinSuccessNotice
                // （YUJ-106 契约 key），Web 首页 MainPage consumeJoinSuccessNotice + showJoinSuccessToast
                // 按 kind='group' 渲染「已加入「<群名> 群聊」/ 位于「<Space 名> 空间」/ 切换过去 →」。
                // 纯内联 JS，不引入 npm / 构建依赖。
                try {
                    var groupSpaceId = (resp && resp.space_id) ? resp.space_id : '';
                    var prevSpaceId = '';
                    try { prevSpaceId = localStorage.getItem('currentSpaceId') || ''; } catch (e) { /* best-effort */ }
                    if (groupSpaceId && prevSpaceId && groupSpaceId !== prevSpaceId) {
                        var spaceName = (resp && resp.space_name) ? resp.space_name : '';
                        var groupName = (resp && resp.group_name) ? resp.group_name : '';
                        sessionStorage.setItem('pendingJoinSuccessNotice', JSON.stringify({
                            kind: 'group',
                            spaceId: groupSpaceId,
                            spaceName: spaceName,
                            entityName: groupName,
                            groupNo: (resp && resp.group_no) ? resp.group_no : groupNo,
                            groupName: groupName,
                            crossSpace: true,
                            ts: Date.now()
                        }));
                    }
                    // 同 Space / 私群（space_id=""）/ 异常：不写 sessionStorage，保持原行为。
                } catch (e) { /* best-effort，不阻塞跳转 */ }
                im.showConversation(groupNo,2)
            }).fail(function(e){
                alert("错误：",JSON.stringify(e));
            })

        });
    })
</script>

</html>
